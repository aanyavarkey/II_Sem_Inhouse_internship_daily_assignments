<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{background-color: blanchedalmond;}
    nav{
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 15px 40px;
background-color: rgb(55, 171, 225);
    border: 2px solid black;
}
nav ul{
    display: flex;
    list-style: none;
    gap: 40px;
    font-size: large;
}
    button{
        color: yellow;
        padding:8px;
border-radius:20px;
cursor:pointer;
background-color:rgb(243, 56, 56);
    }
    p{
        font-size: larger;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    section{
        display: flex;
        gap:10px;
         justify-content: space-between;
    align-items: center;

    padding: 15px 40px;
    }
    .dark-mode{
    background-color: #222;
    color: white;
}
#registration-form{
    display: none;
}
</style>
<body>
    
    <nav>
        <h1>JEE Master</h1>
        <ul>
            <li>Home</li>
            <li>Courses</li>
            <li>Faculty</li>
            <li>Success stories</li>
            <li>Contact</li>
        </ul>
        <button id="theme-btn">🌙 Dark</button>
    </nav>
     <section class="hero">

    <div class="left">
        <h1>Key features</h1>
        <p>
Crack IIT-JEE with <br>
India's Best Faculty<br>
Join India's best coaching<br>
and achieve your dream.<br></p>
<button id="enroll-btn">Enroll Now</button>

<p id="counter">Enroll Clicks: 0</p>


<button id="explore-btn">Explore </button>
    </div>

    <div class="right">
     <img src=https://blogcdn.aakash.ac.in/wordpress_media/2017/02/blog-image.jpg style="width:400px" > 

    </div>

</section>

    <form id="registration-form">
    <fieldset>

<legend>Personal Details</legend>

<div class="row">

<div class="input-box">
<label>Full Name</label>
<input
type="text"
id="name"
placeholder="Enter your full name"
required>
</div>

<div class="input-box">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

</div>

<div class="row">

<div class="input-box">
<label>Phone Number</label>
<input
type="tel"
id="tel"
placeholder="9876543210"
required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input
type="date"
id="date"
required>
</div>

</div>

<div class="input-box">
    <label>Desired course</label>
    <input 
    type="text" 
    id="course"
    placeholder ="Enter desired course "
    required>

<label>Gender</label>

<div class="gender">

<label>
<input type="radio" name="gender" required>
Male
</label>

<label>
<input type="radio" name="gender">
Female
</label>

<label>
<input type="radio" name="gender">
Other
</label>
<br><br>
<button type="submit">Register</button>
<p id="message"></p>


</div>

</div>

</fieldset></form>
<script>
const enrollButton = document.getElementById("enroll-btn");
const exploreButton = document.getElementById("explore-btn");
let count = 0;

enrollButton.addEventListener("click", function () {
    alert("🎉 Welcome to enrollment!");

    count++;

    document.getElementById("counter").textContent =
        "Enroll Clicks: " + count;

    document.getElementById("registration-form").style.display = "block";
});
exploreButton.addEventListener("click", function () 
{alert("🎉 Welcome to courses!");
});
const themeButton=document.getElementById("theme-btn");
themeButton.addEventListener("click", function(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        themeButton.textContent="☀️ Light";
    }else{
        themeButton.textContent="🌙 Dark";
    }

});
const form = document.getElementById("registration-form");

form.addEventListener("submit", function(event){

    event.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();

    if(name===""){
        alert("Please enter your name");
        return;
    }

    if(email===""){
        alert("Please enter your email");
        return;
    }

    if(phone.length!==10){
        alert("Phone number must contain 10 digits");
        return;
    }

    document.getElementById("message").textContent =
    "✅ Registration Successful!";
});
</script>
</body>
</html>
