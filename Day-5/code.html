<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickable Designer Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #090d16;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Designer Gradient Button Base */
        .btn-designer {
            position: relative;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            outline: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Interactive Hover State */
        .btn-designer:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.5);
            opacity: 0.95;
        }

        /* Tactile Press Down (Active State) */
        .btn-designer:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        /* Disabled / Processing UI State */
        .btn-designer:disabled {
            background: #334155;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Subtle Shimmer Overlay Layer */
        .btn-designer::after {
            content: '';
            position: absolute;
            top: 0; left: -50%;
            width: 200%; height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.15) 50%, 
                rgba(255,255,255,0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .btn-designer:hover::after {
            left: 125%;
            opacity: 1;
        }

        /* Spinner Animation */
        .spinner {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button type="button" class="btn-designer" id="actionBtn">
        <span class="btn-text">Complete Registration</span>
        <i class="bi bi-arrow-right-short fs-4 btn-icon"></i>
    </button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#actionBtn').on('click', function() {
                const $btn = $(this);
                const $text = $btn.find('.btn-text');
                const $icon = $btn.find('.btn-icon');

                // Prevent multi-clicks during submission animation
                $btn.prop('disabled', true);
                $text.text('Processing Access...');
                $icon.removeClass('bi-arrow-right-short').addClass('bi-arrow-repeat spinner');

                // Simulate processing delays
                setTimeout(function() {
                    alert('✨ Access Confirmed! Welcome aboard.');
                    
                    // Reset Button State
                    $btn.prop('disabled', false);
                    $text.text('Complete Registration');
                    $icon.removeClass('bi-arrow-repeat spinner').addClass('bi-arrow-right-short');
                }, 1500);
            });
        });
    </script>
</body>
</html>
