<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background: linear-gradient(135deg,#D4AF37,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:40px 0;
}
.container{
    width:700px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.3);
    
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#4E0707;
}
h2{
    text-align:center;
    margin-bottom:25px;
    color:#4E0707;
}

fieldset{
    border:2px solid #4E0707;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

legend{
    font-weight:bold;
    color:#4E0707;
    padding:0 10px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.input-box{
    flex:1;
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#4E0707;
    box-shadow:0 0 8px rgba(230, 47, 47, 0.5);
}

textarea{
    resize:none;
}

.gender{
    display:flex;
    gap:20px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0077b6;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#023e8a;
    transform:scale(1.02);
}
input[type="file"]{
    padding:10px;
    background:#f8f9fa;
    border:2px dashed #0077b6;
    border-radius:8px;
    cursor:pointer;
}

input[type="file"]:hover{
    background:#e3f2fd;
}

</style>

</head>

<body>

<div class="container">
<h1>ABC College</h1>
<h2>Student Registration Form</h2>

<form>

<fieldset>

<legend>Personal Details</legend>

<div class="row">

<div class="input-box">
<label>Full Name</label>
<input
type="text"
placeholder="Enter your full name"
required>
</div>

<div class="input-box">
<label>Email</label>
<input
type="email"
placeholder="Enter your email"
required>
</div>

</div>

<div class="row">

<div class="input-box">
<label>Phone Number</label>
<input
type="tel"
placeholder="9876543210"
required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input
type="date"
required>
</div>

</div>

<div class="input-box">
    <label>Desired course</label>
    <input type="text" placeholder ="Enter desired course "

<label>Gender</label>

<div class="gender">

<label>
<input type="radio" name="gender" required>
Male
</label>

<label>
<input type="radio" name="gender">
Female
</label>

<label>
<input type="radio" name="gender">
Other
</label>

</div>

</div>

</fieldset>

<fieldset>

<legend>School educational Details</legend>

<div class="row">

<div class="input-box">
<label>School</label>
<input
type="text"
placeholder="Enter school name"
required>
</div>

<div class="input-box">
<label>Stream</label>

<select required>

<option value="">Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>

</select>

</div>

</div>

<div class="row">

<div class="input-box">
<label>Year of passing</label>
<input type="text"  placeholder="Enter year of passing"
</div>

<div class="input-box">
<label>Percentage</label>

<input
type="number"
step="0.01"
min="0"
max="10"
placeholder="Enter Percentage"
required>

</div>

</div>

</fieldset>

<fieldset>

<legend>Address</legend>

<div class="input-box">

<label>Address</label>

<textarea
rows="4"
placeholder="Enter your address"
required></textarea>

</div>

    <legend>Upload Photo</legend>

    <div class="input-box">

        <label>Upload Passport Size Photo</label>

        <input
        type="file"
        accept="image/*"
        required>

    </div>

</fieldset>

<button type="submit">
Register
</button>

</form>

</div>

</body>
</html>
